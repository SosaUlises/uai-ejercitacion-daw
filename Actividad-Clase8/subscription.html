<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suscripción - Diario La Ciudad</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <script src="./assets/subscription.js" defer></script>
</head>
<body>

  <header class="encabezado">
    <div class="fecha">
      <p>Miércoles 26 de junio de 2026</p>
    </div>

    <div class="titulo-contenedor">
      <h1>Diario La Ciudad</h1>
      <button class="menu-hamburguesa" type="button" aria-label="Abrir menú">☰</button>
    </div>

    <nav class="menu" aria-label="Navegación principal">
      <ul>
        <li><a href="../Actividad-Clase6/">Inicio</a></li>
        <li><a href="#">Política</a></li>
        <li><a href="#">Sociedad</a></li>
        <li><a href="#">Economía</a></li>
        <li><a href="#">Deportes</a></li>
        <li><a href="./subscription.html" aria-current="page">Suscripción</a></li>
      </ul>
    </nav>
  </header>

  <main class="contenedor">
    <section class="suscripcion">
      <div class="encabezado-formulario">
        <p class="categoria">Lectores</p>
        <h2 id="titulo-saludo">HOLA</h2>
        <p>Completá tus datos para recibir las novedades del Diario La Ciudad.</p>
      </div>

      <form id="formulario-suscripcion" class="formulario-suscripcion" novalidate>
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" autocomplete="name">
          <p class="mensaje-error" id="error-nombre"></p>
        </div>

        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email">
          <p class="mensaje-error" id="error-email"></p>
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" autocomplete="new-password">
          <p class="mensaje-error" id="error-password"></p>
        </div>

        <div class="campo">
          <label for="repetirPassword">Repetir contraseña</label>
          <input type="password" id="repetirPassword" name="repetirPassword" autocomplete="new-password">
          <p class="mensaje-error" id="error-repetirPassword"></p>
        </div>

        <div class="campo">
          <label for="edad">Edad</label>
          <input type="number" id="edad" name="edad" min="18" autocomplete="off">
          <p class="mensaje-error" id="error-edad"></p>
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" autocomplete="tel">
          <p class="mensaje-error" id="error-telefono"></p>
        </div>

        <div class="campo">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion" autocomplete="street-address">
          <p class="mensaje-error" id="error-direccion"></p>
        </div>

        <div class="campo">
          <label for="ciudad">Ciudad</label>
          <input type="text" id="ciudad" name="ciudad" autocomplete="address-level2">
          <p class="mensaje-error" id="error-ciudad"></p>
        </div>

        <div class="campo">
          <label for="codigoPostal">Código postal</label>
          <input type="text" id="codigoPostal" name="codigoPostal" autocomplete="postal-code">
          <p class="mensaje-error" id="error-codigoPostal"></p>
        </div>

        <div class="campo">
          <label for="dni">DNI</label>
          <input type="text" id="dni" name="dni" autocomplete="off">
          <p class="mensaje-error" id="error-dni"></p>
        </div>

        <div class="acciones-formulario">
          <button type="submit">Enviar</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="pie">
    <p>Diario La Ciudad - Sosa Ulises</p>
  </footer>

</body>
</html>
